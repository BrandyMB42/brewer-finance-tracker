# =============================================================================
# Harness Delegate values
# -----------------------------------------------------------------------------
# These values are passed to the `harness-delegate-ng` subchart declared as a
# dependency in Chart.yaml. They configure a self-hosted delegate that lets the
# Harness pipelines (see harness/pipelines/) run on our own Kubernetes cluster
# instead of Harness Cloud.
#
# IMPORTANT — the delegate token is NOT stored here.
#   The token is sensitive and must never be committed to git. It lives only in
#   a Kubernetes Secret named `harness-delegate-token` (key `DELEGATE_TOKEN`)
#   that is created manually on the cluster, out-of-band, before the first
#   ArgoCD sync. That Secret is intentionally excluded from GitOps management.
#   See ../README.md for the exact `kubectl create secret` command.
# =============================================================================

harness-delegate-ng:
  delegateName: gcp-delegate
  accountId: 3sLn7hV4RiSWUTk3M52ciQ
  managerEndpoint: https://app.harness.io
  delegateDockerImage: us-docker.pkg.dev/gar-prod-setup/harness-public/harness/delegate:26.06.89303
  replicas: 1

  # Read the delegate token from our manually-managed Secret instead of letting
  # the chart create and manage its own (empty) gcp-delegate token Secret.
  # `existingDelegateToken` is the chart's parameter for this; the referenced
  # Secret MUST expose the token under the key `DELEGATE_TOKEN` (the key name is
  # fixed by the chart and is not configurable). When set, it takes precedence
  # over `delegateToken`.
  existingDelegateToken: harness-delegate-token

  # The delegate image (delegateDockerImage) and chart version are pinned in git
  # and upgraded via PR, so the in-cluster auto-upgrader is disabled — it would
  # otherwise change the image out from under ArgoCD (drift) and also needs its
  # own UPGRADER_TOKEN secret to authenticate.
  upgrader:
    enabled: false

  # NOTE: this chart does not take a Kubernetes-style `resources:` block. It
  # exposes flat `cpu` and `memory` values (memory is in MiB, as a number) which
  # it maps to the delegate container's requests/limits.
  cpu: 0.5
  memory: 512
