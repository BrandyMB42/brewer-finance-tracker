# =============================================================================
# Harness delegate token Secret
# -----------------------------------------------------------------------------
# Creates the `harness-delegate-token` Secret that the delegate reads its auth
# token from. The value comes from the Helm value `delegateTokenValue`, which is
# only a placeholder in git (see values.yaml). ArgoCD overrides that value from a
# Kubernetes secret on the cluster at sync time, so the real token is never
# stored in this repository.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: harness-delegate-token
  namespace: harness-delegate-ng
type: Opaque
stringData:
  delegateToken: {{ .Values.delegateTokenValue | quote }}
