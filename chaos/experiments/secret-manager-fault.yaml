# Harness Chaos Engineering experiment: Secret Manager access denial
#
# Steady-state hypothesis: the /webhook endpoint returns HTTP 2xx/4xx (not 5xx)
# under normal operation.  If Secret Manager access is revoked, the service must
# degrade gracefully — the probe expects a 500 rather than a crash or hang.
#
# Import into Harness CE: Chaos > Environments > brewer-finance-tracker-staging
#   > New Experiment > Import YAML.

kind: Workflow
apiVersion: argoproj.io/v1alpha1
metadata:
  name: secret-manager-fault
  namespace: hce
  labels:
    subject: brewer-finance-tracker
    environment: staging
spec:
  arguments:
    parameters:
      - name: adminModeNamespace
        value: hce
      - name: gcpProjectId
        value: "YOUR_GCP_PROJECT_ID"
      - name: serviceAccount
        value: "finance-tracker-sa@YOUR_GCP_PROJECT_ID.iam.gserviceaccount.com"
      - name: targetUrl
        value: "https://brewer-finance-tracker-staging-HASH.run.app/webhook"
      - name: chaosDurationSeconds
        value: "60"

  entrypoint: chaos-steps
  serviceAccountName: argo-chaos

  templates:
    # -----------------------------------------------------------------------
    # Orchestration
    # -----------------------------------------------------------------------
    - name: chaos-steps
      steps:
        - - name: steady-state-before
            template: probe-webhook
            arguments:
              parameters:
                - name: expectedStatus
                  value: "200-499"   # healthy: any non-5xx

        - - name: inject-fault
            template: revoke-secret-access

        - - name: steady-state-during
            template: probe-webhook
            arguments:
              parameters:
                - name: expectedStatus
                  value: "500"       # degraded gracefully — 500, not a crash

        - - name: restore
            template: restore-secret-access

        - - name: steady-state-after
            template: probe-webhook
            arguments:
              parameters:
                - name: expectedStatus
                  value: "200-499"   # recovered

    # -----------------------------------------------------------------------
    # Probe: POST a minimal valid Plaid webhook and check the HTTP status
    # -----------------------------------------------------------------------
    - name: probe-webhook
      inputs:
        parameters:
          - name: expectedStatus
      script:
        image: curlimages/curl:8.6.0
        command: [sh]
        source: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"webhook_type":"ITEM","webhook_code":"WEBHOOK_UPDATE_ACKNOWLEDGED","item_id":"probe-item"}' \
            "{{workflow.parameters.targetUrl}}")
          echo "HTTP status: ${STATUS}"
          EXPECTED="{{inputs.parameters.expectedStatus}}"
          # Support range like "200-499"
          if echo "${EXPECTED}" | grep -q '-'; then
            LO=$(echo "${EXPECTED}" | cut -d- -f1)
            HI=$(echo "${EXPECTED}" | cut -d- -f2)
            if [ "${STATUS}" -ge "${LO}" ] && [ "${STATUS}" -le "${HI}" ]; then
              exit 0
            fi
          elif [ "${STATUS}" = "${EXPECTED}" ]; then
            exit 0
          fi
          echo "FAIL: expected ${EXPECTED}, got ${STATUS}"
          exit 1

    # -----------------------------------------------------------------------
    # Fault injection: revoke secretAccessor from the runtime service account
    # -----------------------------------------------------------------------
    - name: revoke-secret-access
      script:
        image: google/cloud-sdk:slim
        command: [bash]
        source: |
          gcloud projects remove-iam-policy-binding "{{workflow.parameters.gcpProjectId}}" \
            --member="serviceAccount:{{workflow.parameters.serviceAccount}}" \
            --role="roles/secretmanager.secretAccessor" \
            --condition=None \
            --quiet
          echo "IAM binding removed — sleeping {{workflow.parameters.chaosDurationSeconds}}s"
          sleep "{{workflow.parameters.chaosDurationSeconds}}"

    # -----------------------------------------------------------------------
    # Restore: re-grant the removed IAM binding
    # -----------------------------------------------------------------------
    - name: restore-secret-access
      script:
        image: google/cloud-sdk:slim
        command: [bash]
        source: |
          gcloud projects add-iam-policy-binding "{{workflow.parameters.gcpProjectId}}" \
            --member="serviceAccount:{{workflow.parameters.serviceAccount}}" \
            --role="roles/secretmanager.secretAccessor" \
            --condition=None \
            --quiet
          echo "IAM binding restored"
