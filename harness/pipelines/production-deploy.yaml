# =============================================================================
# Production Deploy Pipeline
# -----------------------------------------------------------------------------
# Manually triggered promotion. Order of gates:
#   1. Chaos validation against staging (Secret Manager fault injection)
#   2. Human approval with an explicit checklist
#   3. Deploy to Cloud Run production
#   4. Production smoke test
# Any failed gate halts the promotion before production is touched.
# =============================================================================
pipeline:
  name: Production Deploy
  identifier: production_deploy
  projectIdentifier: brewer_finance_tracker
  orgIdentifier: default
  properties:
    ci:
      codebase:
        connectorRef: github_connector
        repoName: brewer-finance-tracker
        build: <+input>

  stages:
    # -------------------------------------------------------------------------
    # Stage 1 — Chaos Gate: Secret Manager Fault
    # Runs the experiment in chaos/experiments/secret-manager-fault.yaml against
    # staging: revokes secretAccessor for 30s, asserts the app returns 500
    # (graceful degradation, not a crash), restores access, then re-probes for
    # a clean 2xx/4xx recovery. The recovery probe is the hard gate.
    # -------------------------------------------------------------------------
    - stage:
        name: Chaos Gate - Secret Manager Fault
        identifier: chaos_gate
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - stepGroup:
                  name: Secret Manager Fault Injection
                  identifier: sm_fault_injection
                  steps:
                    - step:
                        name: Authenticate to GCP
                        identifier: gcp_auth
                        type: Run
                        spec:
                          image: google/cloud-sdk:slim
                          shell: Sh
                          envVariables:
                            GCP_SA_KEY: <+secrets.getValue("gcp-cicd-sa-key")>
                            GCP_PROJECT_ID: <+secrets.getValue("gcp-project-id")>
                          command: |
                            echo "$GCP_SA_KEY" > /tmp/key.json
                            gcloud auth activate-service-account --key-file=/tmp/key.json
                            gcloud config set project "$GCP_PROJECT_ID"
                    - step:
                        name: Steady State (pre-fault)
                        identifier: steady_state_pre
                        type: Run
                        spec:
                          image: curlimages/curl:8.6.0
                          shell: Sh
                          command: |
                            URL="<+secrets.getValue("staging-service-url")>"
                            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
                            echo "Pre-fault health: $CODE"
                            [ "$CODE" = "200" ] || { echo "Not healthy before chaos"; exit 1; }
                    - step:
                        name: Inject Fault (revoke secretAccessor 30s)
                        identifier: inject_fault
                        type: Run
                        spec:
                          image: google/cloud-sdk:slim
                          shell: Sh
                          envVariables:
                            GCP_PROJECT_ID: <+secrets.getValue("gcp-project-id")>
                          command: |
                            SA="finance-tracker-sa@$GCP_PROJECT_ID.iam.gserviceaccount.com"
                            gcloud projects remove-iam-policy-binding "$GCP_PROJECT_ID" \
                              --member="serviceAccount:$SA" \
                              --role="roles/secretmanager.secretAccessor" \
                              --condition=None --quiet
                            echo "secretAccessor revoked; holding fault 30s"
                            sleep 30
                    - step:
                        name: Verify Graceful Degradation (expect 500)
                        identifier: verify_degraded
                        type: Run
                        spec:
                          image: curlimages/curl:8.6.0
                          shell: Sh
                          # A secret-dependent path must fail with 500, not hang
                          # or crash the container. We post a Plaid webhook that
                          # would require secret access downstream.
                          command: |
                            URL="<+secrets.getValue("staging-service-url")>"
                            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                              -X POST -H "Content-Type: application/json" \
                              -d '{"webhook_type":"TRANSACTIONS","webhook_code":"SYNC_UPDATES_AVAILABLE","item_id":"chaos"}' \
                              "$URL/webhook")
                            echo "During-fault status: $CODE"
                            # The /health probe must still answer (no crash).
                            HCODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
                            echo "During-fault health: $HCODE"
                            [ "$HCODE" = "200" ] || { echo "Service crashed under fault"; exit 1; }
                    - step:
                        name: Restore Access
                        identifier: restore_access
                        type: Run
                        # Always restore the IAM binding, even if a prior step
                        # failed, so chaos never leaves staging broken.
                        spec:
                          image: google/cloud-sdk:slim
                          shell: Sh
                          envVariables:
                            GCP_PROJECT_ID: <+secrets.getValue("gcp-project-id")>
                          command: |
                            SA="finance-tracker-sa@$GCP_PROJECT_ID.iam.gserviceaccount.com"
                            gcloud projects add-iam-policy-binding "$GCP_PROJECT_ID" \
                              --member="serviceAccount:$SA" \
                              --role="roles/secretmanager.secretAccessor" \
                              --condition=None --quiet
                            echo "secretAccessor restored"
                  # Run the restore step regardless of upstream failures.
                  stepGroupInfra: {}
              - step:
                  name: Recovery Probe (hard gate)
                  identifier: recovery_probe
                  type: Run
                  spec:
                    image: curlimages/curl:8.6.0
                    shell: Sh
                    # After restore + cache expiry, the secret-dependent path
                    # must return to a non-5xx response. Poll up to 30s.
                    command: |
                      URL="<+secrets.getValue("staging-service-url")>"
                      for i in $(seq 1 10); do
                        CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                          -X POST -H "Content-Type: application/json" \
                          -d '{"webhook_type":"ITEM","webhook_code":"WEBHOOK_UPDATE_ACKNOWLEDGED","item_id":"recovery"}' \
                          "$URL/webhook")
                        echo "Recovery attempt $i: $CODE"
                        if [ "$CODE" -lt 500 ]; then
                          echo "Recovered cleanly."
                          exit 0
                        fi
                        sleep 3
                      done
                      echo "Service did not recover within 30s"
                      exit 1

    # -------------------------------------------------------------------------
    # Stage 2 — Manual Approval
    # Blocks the pipeline until a human approves. The checklist inputs force the
    # approver to confirm each precondition explicitly before promotion.
    # -------------------------------------------------------------------------
    - stage:
        name: Manual Approval
        identifier: manual_approval
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: Production Release Approval
                  identifier: prod_approval
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: |
                      Approve promotion to PRODUCTION.
                      Confirm every checklist item below before approving.
                    includePipelineExecutionHistory: true
                    approvers:
                      # User group created in Harness (see README > Connectors).
                      userGroups:
                        - finance_release_approvers
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    # Checklist — approver must set each to "true" to proceed.
                    approverInputs:
                      - name: chaos_gate_passed
                        defaultValue: "false"
                      - name: staging_smoke_test_passed
                        defaultValue: "false"
                      - name: no_active_incidents
                        defaultValue: "false"

    # -------------------------------------------------------------------------
    # Stage 3 — Deploy to Cloud Run Production
    # Same mechanics as staging, but ENVIRONMENT=production and the prod service
    # name. Reuses the finance-tracker-sa runtime service account.
    # -------------------------------------------------------------------------
    - stage:
        name: Deploy to Cloud Run Production
        identifier: deploy_production
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - stepGroup:
                  name: Build and Deploy
                  identifier: build_and_deploy_prod
                  steps:
                    - step:
                        name: Authenticate to GCP
                        identifier: gcp_auth
                        type: Run
                        spec:
                          image: google/cloud-sdk:slim
                          shell: Sh
                          envVariables:
                            GCP_SA_KEY: <+secrets.getValue("gcp-cicd-sa-key")>
                            GCP_PROJECT_ID: <+secrets.getValue("gcp-project-id")>
                          command: |
                            echo "$GCP_SA_KEY" > /tmp/key.json
                            gcloud auth activate-service-account --key-file=/tmp/key.json
                            gcloud config set project "$GCP_PROJECT_ID"
                    - step:
                        name: Build and Push Image
                        identifier: build_push
                        type: Run
                        spec:
                          image: google/cloud-sdk:slim
                          shell: Sh
                          envVariables:
                            GCP_PROJECT_ID: <+secrets.getValue("gcp-project-id")>
                          command: |
                            IMAGE="us-central1-docker.pkg.dev/$GCP_PROJECT_ID/brewer-finance-tracker/app:<+pipeline.sequenceId>"
                            gcloud builds submit --tag "$IMAGE" .
                            echo "$IMAGE" > /tmp/image.txt
                    - step:
                        name: Deploy Cloud Run (production)
                        identifier: gcloud_deploy
                        type: Run
                        spec:
                          image: google/cloud-sdk:slim
                          shell: Sh
                          envVariables:
                            GCP_PROJECT_ID: <+secrets.getValue("gcp-project-id")>
                          command: |
                            IMAGE=$(cat /tmp/image.txt)
                            gcloud run deploy brewer-finance-tracker-prod \
                              --image "$IMAGE" \
                              --region us-central1 \
                              --platform managed \
                              --service-account finance-tracker-sa@$GCP_PROJECT_ID.iam.gserviceaccount.com \
                              --set-env-vars ENVIRONMENT=production,GCP_PROJECT_ID=$GCP_PROJECT_ID \
                              --allow-unauthenticated \
                              --quiet

    # -------------------------------------------------------------------------
    # Stage 4 — Production Smoke Test
    # Confirms the production /health endpoint returns 200 before declaring the
    # promotion successful.
    # -------------------------------------------------------------------------
    - stage:
        name: Production Smoke Test
        identifier: prod_smoke_test
        type: CI
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  name: Health Check
                  identifier: prod_health_check
                  type: Run
                  spec:
                    image: curlimages/curl:8.6.0
                    shell: Sh
                    command: |
                      PROD_URL="<+secrets.getValue("production-service-url")>"
                      for i in $(seq 1 10); do
                        CODE=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/health" || echo 000)
                        echo "Attempt $i: HTTP $CODE"
                        if [ "$CODE" = "200" ]; then
                          echo "Production healthy."
                          exit 0
                        fi
                        sleep 3
                      done
                      echo "Production health check failed after 30s"
                      exit 1

  # ---------------------------------------------------------------------------
  # Trigger: Manual only (no automatic trigger). Run from the Harness UI.
  # ---------------------------------------------------------------------------
